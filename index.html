<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klyx SaaS</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

<header class="nav">
  <div class="logo">
    <!-- LOGO KLYX -->
    <svg width="40" height="40" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" stroke="white" stroke-width="6" fill="none"/>
      <path d="M30 70 L50 30 L70 70" stroke="white" stroke-width="6" fill="none"/>
    </svg>
    <span>KLYX</span>
  </div>

  <button onclick="goContact()">Empezar</button>
</header>

<!-- BACKGROUND LAYERS -->
<div class="bg-layer layer1"></div>
<div class="bg-layer layer2"></div>
<div class="bg-layer layer3"></div>

<!-- SCENE 1 -->
<section class="scene hero">
  <h1 class="typewriter">No compitas. Domina.</h1>
  <p>Automatizamos clientes para tu negocio.</p>
</section>

<!-- SCENE 2 -->
<section class="scene">
  <h2 class="parallax">La mayoría de negocios pierden clientes sin saberlo.</h2>
</section>

<!-- SCENE 3 -->
<section class="scene dark">
  <h2 class="parallax">Klyx convierte tráfico en clientes automáticamente.</h2>
</section>

<!-- SCENE 4 -->
<section class="scene">
  <h2 class="parallax">Sistema SaaS de captación + automatización.</h2>
</section>

<!-- CTA -->
<section id="contact" class="scene contact">
  <h2>Empieza ahora</h2>

  <form id="form">
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Tu negocio"></textarea>
    <button type="submit">Quiero acceso</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
